# yaml-language-server: $schema=https://raw.githubusercontent.com/CGuiho/mirror/main/mirror/schema/mirror.schema.json
schema: 1
project:
  name: xdocs
version:
  scheme: semver
  source: git
  output:
    - git
  prerelease_id: ""
git:
  tag_template: "{name}/v{version}"
  commit: true
  push: true
  allow_dirty: false
agents:
  write_changelog: false
  changelog_path: CHANGELOG.md
