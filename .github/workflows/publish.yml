name: Publish

on:
  push:
    tags:
      - '@guiho/xdocs@*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: ''

      - run: npm --version
      - run: node --version

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: bun run binaries

      - name: Upload native binary workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xdocs-native-binaries-${{ github.ref_name }}
          path: bin/xdocs-*
          if-no-files-found: error
          retention-days: 30

      - name: Publish native binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" bin/xdocs-* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" bin/xdocs-* --title "${GITHUB_REF_NAME}" --notes-file CHANGELOG.md
          fi

      - name: Verify GitHub release binary assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '[.assets[] | select(.name | startswith("xdocs-"))] | length')

          if [ "$COUNT" -ne 12 ]; then
            echo "Expected 12 xdocs native binary assets, found $COUNT" >&2
            gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' >&2
            exit 1
          fi

      - run: npm config delete always-auth || true

      - name: Publish to npm
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")

          TAG=$(bun -e '
            const version = require("./package.json").version;

            const prereleaseMatch = version.match(/^\d+\.\d+\.\d+-([^+]+)/);

            if (!prereleaseMatch) {
              console.log("latest");
              process.exit(0);
            }

            const prerelease = prereleaseMatch[1];
            const firstIdentifier = prerelease.split(".")[0];

            if (/[A-Za-z]/.test(firstIdentifier)) {
              console.log(firstIdentifier);
            } else {
              console.log("prerelease");
            }
          ')

          echo "Package version: $VERSION"
          echo "Publishing with npm dist-tag: $TAG"

          npm publish --access public --tag "$TAG"
