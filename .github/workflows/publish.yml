name: Publish

on:
  push:
    tags:
      - '@guiho/xdocs@*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          "$HOME/.bun/bin/bun" --version

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: bun run binaries

      - name: Publish native binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" bin/xdocs-* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" bin/xdocs-* --title "${GITHUB_REF_NAME}" --notes-file CHANGELOG.md
          fi

      - name: Verify GitHub release binary assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '[.assets[] | select(.name | startswith("xdocs-"))] | length')

          if [ "$COUNT" -ne 12 ]; then
            echo "Expected 12 xdocs native binary assets, found $COUNT" >&2
            gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' >&2
            exit 1
          fi
