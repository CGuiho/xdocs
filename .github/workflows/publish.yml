name: Publish

on:
  push:
    tags:
      - '@guiho/xdocs@*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          "$HOME/.bun/bin/bun" --version

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: bun run binaries

      - name: Publish exact RFC 0034 assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" bin/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" bin/* --title "${GITHUB_REF_NAME}" --notes-file CHANGELOG.md
          fi

      - name: Verify exact fourteen-asset GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXPECTED=$(find bin -maxdepth 1 -type f -printf '%f\n' | sort)
          ACTUAL=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | sort)
          test "$(printf '%s\n' "$EXPECTED" | sed '/^$/d' | wc -l)" -eq 14
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "GitHub release does not contain the exact RFC 0034 fourteen-asset set." >&2
            diff -u <(printf '%s\n' "$EXPECTED") <(printf '%s\n' "$ACTUAL") >&2 || true
            exit 1
          fi
