name: Publish

on:
  push:
    tags:
      - '@guiho/xdocs@*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: bun run binaries

      - name: Publish native binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" bin/xdocs-* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" bin/xdocs-* --title "${GITHUB_REF_NAME}" --notes-file CHANGELOG.md
          fi
