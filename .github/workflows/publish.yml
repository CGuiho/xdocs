name: Publish

on:
  push:
    tags:
      - 'xdocs/v*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache: true

      - name: Resolve Git version
        id: version
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            xdocs/v*) VERSION="${GITHUB_REF_NAME#xdocs/v}" ;;
            *) echo "invalid XDocs Go tag: ${GITHUB_REF_NAME}" >&2; exit 1 ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate Go implementation
        run: |
          test -z "$(gofmt -l .)"
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go test ./...
          go vet ./...

      - name: Build exact eleven-artifact release
        run: |
          go run ./devops/build-binaries.go \
            --version "${{ steps.version.outputs.version }}" \
            --commit "${GITHUB_SHA}" \
            --build-date "$(git show -s --format=%cI "${GITHUB_SHA}")"
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 11
          (cd dist && sha256sum --check checksums.txt)

      - name: Extract exact-version release notes
        run: go run ./devops/extract-release-notes "${GITHUB_REF_NAME}" CHANGELOG.md "${RUNNER_TEMP}/xdocs-release-notes.md"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RELEASE_FLAGS=(--latest)
          if [[ "${{ steps.version.outputs.version }}" == *-* ]]; then
            RELEASE_FLAGS=(--prerelease)
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            while IFS= read -r asset; do
              if [ -n "$asset" ] && [ ! -f "dist/$asset" ]; then
                gh release delete-asset "${GITHUB_REF_NAME}" "$asset" --yes
              fi
            done < <(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${RUNNER_TEMP}/xdocs-release-notes.md" \
              "${RELEASE_FLAGS[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${RUNNER_TEMP}/xdocs-release-notes.md" \
              --verify-tag \
              "${RELEASE_FLAGS[@]}"
          fi

      - name: Verify exact eleven GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          EXPECTED="$(find dist -maxdepth 1 -type f -printf '%f\n' | sort)"
          ACTUAL="$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | sort)"
          test "$(printf '%s\n' "$EXPECTED" | sed '/^$/d' | wc -l)" -eq 11
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "XDocs release does not contain the exact eleven Go CLI assets." >&2
            diff -u <(printf '%s\n' "$EXPECTED") <(printf '%s\n' "$ACTUAL") >&2 || true
            exit 1
          fi

      - name: Verify exact-version public Linux installer
        run: |
          public_home="$(mktemp -d)"
          project_dir="$(mktemp -d)"
          install_dir="$public_home/.local/bin"
          trap 'rm -rf "$public_home" "$project_dir"' EXIT
          export HOME="$public_home"
          export XDOCS_INSTALL_DIR="$install_dir"
          export XDOCS_SKIP_PATH_UPDATE=1
          export XDOCS_DISABLE_UPDATE_CHECK=1
          cd "$project_dir"
          curl -fsSL "https://raw.githubusercontent.com/CGuiho/xdocs/${GITHUB_SHA}/devops/install.sh" |
            sh -s -- --version "${{ steps.version.outputs.version }}"
          test "$("$install_dir/xdocs" --version)" = "xdocs v${{ steps.version.outputs.version }}"
          test -s "$HOME/.agents/skills/guiho-s-xdocs/SKILL.md"
          test -s "$HOME/.claude/skills/guiho-s-xdocs/SKILL.md"
          grep -q '<!-- BEGIN XDOCS' AGENTS.md

  windows-installer:
    name: Verify exact-version public Windows installer
    needs:
      - publish
    runs-on: windows-latest
    steps:
      - name: Install the exact tagged XDocs release
        shell: pwsh
        env:
          XDOCS_VERSION: ${{ needs.publish.outputs.version }}
          XDOCS_INSTALL_DIR: ${{ runner.temp }}\xdocs-public\bin
          XDOCS_SKIP_PATH_UPDATE: '1'
          XDOCS_DISABLE_UPDATE_CHECK: '1'
        run: |
          New-Item -ItemType Directory -Force -Path $env:XDOCS_INSTALL_DIR | Out-Null
          $source = Invoke-RestMethod "https://raw.githubusercontent.com/CGuiho/xdocs/${{ github.sha }}/devops/install.ps1"
          & ([scriptblock]::Create($source))
          $actual = & "$env:XDOCS_INSTALL_DIR\xdocs.exe" --version
          if ($actual -ne "xdocs v$env:XDOCS_VERSION") {
            throw "Unexpected installed version: $actual"
          }
          if (-not (Test-Path -LiteralPath "$HOME\.agents\skills\guiho-s-xdocs\SKILL.md")) {
            throw "Missing .agents skill installation."
          }
          if (-not (Test-Path -LiteralPath "$HOME\.claude\skills\guiho-s-xdocs\SKILL.md")) {
            throw "Missing .claude skill installation."
          }
          if (-not (Select-String -LiteralPath AGENTS.md -SimpleMatch "<!-- BEGIN XDOCS" -Quiet)) {
            throw "Missing reconciled XDocs instruction block."
          }
