name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: bun run binary
      - run: bun run binaries
      - name: Upload native binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xdocs-native-binaries-${{ github.sha }}
          path: bin/xdocs-*
          if-no-files-found: error
          retention-days: 14
